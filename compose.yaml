# Docker Compose – esptfa-arima
# Matches the configuration defined in esptfa_arima/esptfaARIMA/settings_ci.py
#
# Services
#   web  – Daphne ASGI server (Django + serves compiled React frontend)
#
# Usage:
#   1. Ensure esptfa_arima/.env exists with at least DJANGO_SECRET_KEY set.
#   2. docker compose up --build

services:
  # ──────────────────────────────────────────────────────────────
  # Web – Daphne ASGI server
  # ──────────────────────────────────────────────────────────────
  web:
    image: esptfa_arima_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - esptfa_arima/.env
    environment:
      # Explicitly set here in case .env omits it.
      DJANGO_SETTINGS_MODULE: esptfaARIMA.settings_ci
    restart: on-failure
    volumes:
      # SQLite database file – persisted across container restarts.
      # settings_ci.py: DATABASES NAME = "esptfa_arima" (relative to
      # BASE_DIR = /app/esptfa_arima, resolved by Django at runtime).
      - sqlite-data:/app/esptfa_arima
      # User-uploaded media files (MEDIA_ROOT in settings_ci.py).
      - esptfa_arima_media:/app/esptfa_arima/media
      # Rotating log files written by RotatingFileHandler in settings_ci.py.
      - esptfa_arima_logs:/app/esptfa_arima/logs

# ──────────────────────────────────────────────────────────────────
# Named volumes
# ──────────────────────────────────────────────────────────────────
volumes:
  # Persists the SQLite database file between deploys.
  sqlite-data:
  # Persists user-uploaded files (MEDIA_ROOT).
  esptfa_arima_media:
  # Persists rotating Django & ARIMA log files.
  esptfa_arima_logs:
